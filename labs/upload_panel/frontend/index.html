<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GIF Upload Portal</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
overflow-x:hidden;min-height:100vh;padding-top:46px;display:flex;justify-content:center;align-items:center;
background:
radial-gradient(circle farthest-side at 0% 50%, #14100a 23.5%, rgba(255,170,0,0) 0) 21px 30px,
radial-gradient(circle farthest-side at 0% 50%, #1c150c 24%, rgba(240,166,17,0) 0) 19px 30px,
linear-gradient(#14100a 14%, rgba(240,166,17,0) 0, rgba(240,166,17,0) 85%, #14100a 0),
linear-gradient(150deg,#14100a 24%,#1c150c 0,#1c150c 26%,transparent 0,transparent 74%,#1c150c 0,#1c150c 76%,#14100a 0),
linear-gradient(30deg,#14100a 24%,#1c150c 0,#1c150c 26%,transparent 0,transparent 74%,#1c150c 0,#1c150c 76%,#14100a 0),
linear-gradient(90deg,#1c150c 2%,#14100a 0,#14100a 98%,#1c150c 0) #14100a;
background-size:40px 60px;
font-family:"Courier New",monospace;color:#d4c9a8;animation:crt 6s infinite}
@keyframes crt{93%{opacity:.95}94%,100%,0%{opacity:1}}
.navbar{position:fixed;top:0;left:0;width:100%;height:46px;background:#1a1108;border-bottom:1px solid #3a2c12}
.navbar:before{content:"";position:absolute;left:20px;top:17px;width:12px;height:12px;border-radius:50%;background:#ff5f56;box-shadow:20px 0 #ffbd2e,40px 0 #27c93f}
.navbar:after{content:"root@appist: ~/gif-upload";position:absolute;left:50%;transform:translateX(-50%);top:15px;color:#8a7a52;font-size:12px}
.portal-container{width:100%;max-width:520px;background:#120d06;border:1px solid #3a2c12;border-radius:8px;padding:2.5rem;box-shadow:0 0 0 1px rgba(255,176,0,.05) inset,0 12px 30px rgba(0,0,0,.6)}
h1{color:#ffb000;text-align:center;margin-bottom:10px}p{text-align:center;color:#8a7a52}
.upload-area{margin-top:20px;border:2px dashed #ff8800;border-radius:6px;padding:3rem;text-align:center;background:#1a1108;cursor:pointer}
.upload-area:hover{background:#21170d}
.upload-area input{display:none}
.file-display{display:none;margin-top:20px;padding:12px;border:1px solid #3a2c12;justify-content:space-between}
.submit-btn{margin-top:20px;width:100%;padding:14px;background:#ff8800;border:none;font-weight:bold;cursor:pointer}
.submit-btn:disabled{background:#3a2c12;color:#777}
.error-message{display:none;color:#ff6666;margin-top:10px}
a{color:#ffb000}
</style></head>
<body>
<div class="navbar"></div>
<div class="portal-container">
<h1>GIF Portal</h1>
<p>Upload your favorite animated GIFs securely.</p>
<div class="upload-area" id="dropZone">
<div style="font-size:48px">📁</div>
<div>Drag & Drop GIF here</div>
<div>or click to browse</div>
<input type="file" id="fileInput" accept="image/*,.gif,.jpeg,.png">
</div>
<div class="error-message" id="errorMessage"></div>
<div class="file-display" id="fileDisplay"><span id="fileName"></span><button id="removeBtn">✖</button></div>
<button class="submit-btn" id="submitBtn" disabled>Upload GIF</button>
<p style="margin-top:15px"><a href="/files">View Uploaded Gallery</a></p>
</div>
<script>
let selectedFile=null;
const dz=document.getElementById('dropZone'),fi=fileInput,fd=fileDisplay,fn=fileName,rm=removeBtn,sb=submitBtn,err=errorMessage;
function handleFile(f){if(!f)return;selectedFile=f;fd.style.display='flex';fn.textContent=f.name;sb.disabled=false;}
dz.onclick=()=>fi.click();
fi.onchange=e=>handleFile(e.target.files[0]);
['dragenter','dragover','dragleave','drop'].forEach(ev=>dz.addEventListener(ev,e=>{e.preventDefault();e.stopPropagation();}));
['dragenter','dragover'].forEach(ev=>dz.addEventListener(ev,()=>dz.classList.add('dragover')));
['dragleave','drop'].forEach(ev=>dz.addEventListener(ev,()=>dz.classList.remove('dragover')));
dz.addEventListener('drop',e=>handleFile(e.dataTransfer.files[0]));
rm.onclick=()=>{selectedFile=null;fi.value='';fd.style.display='none';sb.disabled=true;}
sb.onclick=()=>{
const form=new FormData();form.append('file',selectedFile);
sb.disabled=true;sb.textContent='Uploading...';
fetch('/upload',{method:'POST',body:form}).then(r=>r.json()).then(d=>{alert(d.message);location.reload();})
.catch(()=>{err.style.display='block';err.textContent='Upload failed';})
.finally(()=>{sb.textContent='Upload GIF';});
}
</script></body></html>
